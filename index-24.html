<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Cora - Crypto AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0f14;--sur:#13161e;--bdr:#1e2330;--acc:#7c6aff;--acc2:#4fd1c5;--txt:#e8eaf0;--mut:#8892a4;--up:#22c55e;--dn:#ef4444;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:"DM Sans",sans-serif;}
.app{display:flex;flex-direction:column;height:100dvh;}
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;padding:32px 24px;gap:18px;background:var(--bg);}
.slogo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--acc);}
.stitle{font-family:"DM Serif Display",serif;font-size:1.6rem;background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ssub{font-size:0.83rem;color:var(--mut);text-align:center;line-height:1.55;max-width:300px;}
.kwrap{display:flex;width:100%;max-width:360px;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;background:#0d0f14;}
#ki{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-family:"DM Sans",sans-serif;font-size:0.85rem;padding:12px 16px;}
#kt{background:transparent;border:none;color:var(--mut);padding:0 14px;cursor:pointer;font-size:1.1rem;}
#ks{width:100%;max-width:360px;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-family:"DM Sans",sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;}
#ke{font-size:0.78rem;color:var(--dn);min-height:18px;text-align:center;max-width:320px;}
.snote{font-size:0.72rem;color:var(--mut);text-align:center;max-width:300px;line-height:1.5;}
.snote a{color:var(--acc2);text-decoration:none;}
#main{display:none;flex-direction:column;height:100dvh;}
.hdr{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--sur);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.av{position:relative;width:44px;height:44px;flex-shrink:0;}
.av img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid var(--acc);}
.dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--up);border-radius:50%;border:2px solid var(--sur);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4);}50%{box-shadow:0 0 0 4px rgba(34,197,94,0);}}
.hinfo{flex:1;min-width:0;}
.hinfo h1{font-family:"DM Serif Display",serif;font-size:1.1rem;background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hinfo p{font-size:0.7rem;color:var(--mut);margin-top:1px;}
#rk{background:transparent;border:1px solid var(--bdr);color:var(--mut);font-size:0.65rem;padding:4px 10px;border-radius:999px;cursor:pointer;font-family:"DM Sans",sans-serif;white-space:nowrap;flex-shrink:0;}
.tkr{display:flex;overflow-x:auto;flex-shrink:0;background:var(--sur);border-bottom:1px solid var(--bdr);scrollbar-width:none;}
.tkr::-webkit-scrollbar{display:none;}
.tk{display:flex;align-items:center;gap:5px;padding:7px 14px;border-right:1px solid var(--bdr);font-size:0.75rem;white-space:nowrap;flex-shrink:0;}
.tk .sy{font-weight:700;}.tk .pr{color:var(--mut);}
.up{color:var(--up);}.dn{color:var(--dn);}
.msgs{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent;}
.msgs::-webkit-scrollbar{width:3px;}.msgs::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px;}
.msg{display:flex;gap:8px;max-width:88%;animation:fu .2s ease;}
@keyframes fu{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.co{align-self:flex-start;}.msg.us{align-self:flex-end;flex-direction:row-reverse;}
.mav{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid var(--acc);margin-top:2px;}
.uav{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff;margin-top:2px;}
.bub{padding:10px 14px;border-radius:16px;font-size:0.875rem;line-height:1.6;word-break:break-word;}
.msg.co .bub{background:#18213a;border:1px solid var(--bdr);border-top-left-radius:4px;}
.msg.us .bub{background:#1e2a3a;border:1px solid #2a3550;border-top-right-radius:4px;}
.bn{font-size:0.62rem;font-weight:700;letter-spacing:.06em;margin-bottom:5px;background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--mut);margin:0 2px;animation:bop 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bop{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}
.chips{display:flex;gap:8px;overflow-x:auto;padding:8px 12px;flex-shrink:0;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;font-size:0.72rem;padding:6px 12px;border-radius:999px;border:1px solid var(--bdr);background:transparent;color:var(--mut);cursor:pointer;font-family:"DM Sans",sans-serif;flex-shrink:0;}
.chip:active{border-color:var(--acc);color:var(--acc);}
.ibar{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--sur);border-top:1px solid var(--bdr);flex-shrink:0;}
textarea{flex:1;background:#0d0f14;border:1px solid var(--bdr);border-radius:20px;color:var(--txt);font-family:"DM Sans",sans-serif;font-size:0.9rem;padding:10px 16px;resize:none;outline:none;min-height:42px;max-height:120px;line-height:1.45;transition:border-color .2s;}
textarea:focus{border-color:var(--acc);}
textarea::placeholder{color:var(--mut);}
.snd{width:42px;height:42px;border-radius:50%;border:none;flex-shrink:0;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.snd:active{transform:scale(.92);}.snd:disabled{opacity:.35;cursor:not-allowed;}
</style>
</head>
<body>
<div class="app">
<div id="setup">
  <img class="slogo" id="sav" src="" alt="Cora"/>
  <div class="stitle">Meet Cora</div>
  <div class="ssub">Your crypto AI with live market data. Enter your Anthropic API key to start chatting.</div>
  <div class="kwrap">
    <input id="ki" type="password" placeholder="sk-ant-api03-..."/>
    <button id="kt">&#128065;</button>
  </div>
  <div id="ke"></div>
  <button id="ks">Start Chatting &rarr;</button>
  <div class="snote">Key saved only in your browser. Never shared.<br><br>Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></div>
</div>
<div id="main">
  <div class="hdr">
    <div class="av"><img id="hav" src="" alt="Cora"/><span class="dot"></span></div>
    <div class="hinfo"><h1>Cora</h1><p>Crypto AI &middot; <span id="badge">&#9679; connecting...</span></p></div>
    <button id="rk">&#128273; Change Key</button>
  </div>
  <div class="tkr">
    <div class="tk"><span class="sy">BTC</span><span class="pr" id="b-p">--</span><span id="b-c">--</span></div>
    <div class="tk"><span class="sy">ETH</span><span class="pr" id="e-p">--</span><span id="e-c">--</span></div>
    <div class="tk"><span class="sy">SOL</span><span class="pr" id="s-p">--</span><span id="s-c">--</span></div>
    <div class="tk"><span class="sy">BNB</span><span class="pr" id="n-p">--</span><span id="n-c">--</span></div>
    <div class="tk"><span class="sy">DOGE</span><span class="pr" id="d-p">--</span><span id="d-c">--</span></div>
    <div class="tk"><span class="sy">AVAX</span><span class="pr" id="a-p">--</span><span id="a-c">--</span></div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="chips">
    <button class="chip" data-q="What is BTC price right now?">&#128200; BTC price</button>
    <button class="chip" data-q="What is ETH price right now?">&#9001; ETH price</button>
    <button class="chip" data-q="Best DeFi yields right now?">&#128176; DeFi yield</button>
    <button class="chip" data-q="Explain MEV bots">&#129302; MEV bots</button>
    <button class="chip" data-q="What coins are trending today?">&#128293; Trending</button>
    <button class="chip" data-q="CEX vs DEX?">&#128260; CEX vs DEX</button>
    <button class="chip" data-q="Give me trading alpha">&#128081; Alpha</button>
  </div>
  <div class="ibar">
    <textarea id="inp" rows="1" placeholder="Ask Cora anything..."></textarea>
    <button class="snd" id="snd">&#10148;</button>
  </div>
</div>
</div>

  var API_KEY="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";
  var PROXY="https://corsproxy.io/?"+encodeURIComponent("https://api.anthropic.com/v1/messages");

  function getKey(){try{return localStorage.getItem("cora_key")||"";}catch(e){return "";}}
  function saveKey(k){try{localStorage.setItem("cora_key",k);}catch(e){}}
  function clearKey(){try{localStorage.removeItem("cora_key");}catch(e){}}
  function showSetup(){document.getElementById("setup").style.display="flex";document.getElementById("main").style.display="none";}
  function hideSetup(){document.getElementById("setup").style.display="none";document.getElementById("main").style.display="flex";}

  document.getElementById("kt").addEventListener("click",function(){
    var i=document.getElementById("ki");i.type=i.type==="password"?"text":"password";
  });

  async function callAPI(key, messages, system, maxTokens) {
    // Try direct first, then proxy
    var body = JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:maxTokens||1000,
      system:system||"",
      messages:messages
    });
    var headers = {
      "Content-Type":"application/json",
      "x-api-key":key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    };
    // Try direct
    try {
      var r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:headers,body:body});
      var d = await r.json();
      return d;
    } catch(e) {
      console.log("Direct failed, trying proxy:", e.message);
    }
    // Try via corsproxy
    try {
      var r2 = await fetch(PROXY,{method:"POST",headers:headers,body:body});
      var d2 = await r2.json();
      return d2;
    } catch(e2) {
      console.log("Proxy failed:", e2.message);
      throw new Error("Both direct and proxy failed: "+e2.message);
    }
  }

  document.getElementById("ks").addEventListener("click",async function(){
    var k=document.getElementById("ki").value.trim();
    document.getElementById("ke").textContent="";
    if(!k.startsWith("sk-ant-")){document.getElementById("ke").textContent="Key must start with sk-ant-";return;}
    var btn=this;btn.textContent="Testing...";btn.disabled=true;
    try{
      var d=await callAPI(k,[{role:"user",content:"hi"}],"Say hi",10);
      if(d.error){
        document.getElementById("ke").textContent="Key error: "+d.error.message;
        btn.textContent="Start Chatting \u2192";btn.disabled=false;return;
      }
      saveKey(k);API_KEY=k;hideSetup();boot();
    }catch(e){

      btn.textContent="Start Chatting \u2192";btn.disabled=false;
    }
  });

  var LD={ok:false,ts:"",coins:{}};

  function buildSys(){

    }

  function fc(n){n=parseFloat(n);return(n>=0?"+":"")+n.toFixed(2)+"%";}
  function setTick(p,c,price,chg){var pe=document.getElementById(p),ce=document.getElementById(c);if(pe)pe.textContent=fp(price);if(ce){ce.textContent=fc(chg);ce.className=parseFloat(chg)>=0?"up":"dn";}}
  function badge(t,col){var b=document.getElementById("badge");if(b){b.textContent=t;b.style.color=col;}}

  async function fromKraken(){
    var r=await fetch("https://api.kraken.com/0/public/Ticker?pair=XXBTZUSD,XETHZUSD,SOLUSD,BNBUSD,XDGUSD,AVAXUSD");
    var d=await r.json();
    if(d.error&&d.error.length)throw new Error(d.error[0]);
    var R=d.result,out={};
    function p(k,s){var x=R[k];if(!x)return;var c=parseFloat(x.c[0]),o=parseFloat(x.o);out[s]={price:fp(c),chg:((c-o)/o*100).toFixed(2),raw:c};}
    p("XXBTZUSD","BTC");p("XETHZUSD","ETH");p("SOLUSD","SOL");p("BNBUSD","BNB");p("XDGUSD","DOGE");p("AVAXUSD","AVAX");
    if(!out.BTC)throw new Error("no BTC");return out;
  }

  async function fromCoinGecko(){
    var url="https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin,dogecoin,avalanche-2&vs_currencies=usd&include_24hr_change=true";
    var r=await fetch("https://corsproxy.io/?"+encodeURIComponent(url));
    var d=await r.json();
    var map={bitcoin:"BTC",ethereum:"ETH",solana:"SOL",binancecoin:"BNB",dogecoin:"DOGE","avalanche-2":"AVAX"};
    var out={};
    for(var id in map){if(!d[id])continue;var s=map[id];out[s]={price:fp(d[id].usd),chg:parseFloat(d[id].usd_24h_change).toFixed(2),raw:d[id].usd};}
    if(!out.BTC)throw new Error("no BTC");return out;
  }

  async function fetchAll(){
    var srcs=[{n:"Kraken",f:fromKraken},{n:"CoinGecko",f:fromCoinGecko}];
    for(var i=0;i<srcs.length;i++){
      try{
        var coins=await srcs[i].f();
        LD.ok=true;LD.ts=new Date().toUTCString();LD.coins=coins;
        var tk={BTC:["b-p","b-c"],ETH:["e-p","e-c"],SOL:["s-p","s-c"],BNB:["n-p","n-c"],DOGE:["d-p","d-c"],AVAX:["a-p","a-c"]};
        for(var s in tk){if(coins[s])setTick(tk[s][0],tk[s][1],coins[s].raw,coins[s].chg);}
        badge("\u25cf LIVE \u00b7 "+srcs[i].n,"#22c55e");
        return true;
      }catch(e){console.warn("[Cora]",srcs[i].n,"failed:",e.message);}
    }
    badge("\u25cf offline","#ef4444");return false;
  }

  var history=[],busy=false;
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function md(t){
    return t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
      .replace(/\*(.*?)\*/g,"<em>$1</em>")
      .replace(/`([^`]+)`/g,'<code style="background:#111;padding:1px 5px;border-radius:3px;font-size:.82em;">$1</code>')
      .replace(/\n/g,"<br>");
  }

  function addMsg(role,html){
    var wrap=document.getElementById("msgs");
    var div=document.createElement("div");div.className="msg "+(role==="cora"?"co":"us");
    if(role==="cora"){
      var av=document.createElement("img");av.className="mav";av.src=CORA_IMG;av.alt="Cora";
      var bub=document.createElement("div");bub.className="bub";
      var nm=document.createElement("div");nm.className="bn";nm.textContent="CORA";
      bub.appendChild(nm);bub.insertAdjacentHTML("beforeend",html);
      div.appendChild(av);div.appendChild(bub);
    }else{
      var uav=document.createElement("div");uav.className="uav";uav.textContent="U";
      var bub2=document.createElement("div");bub2.className="bub";bub2.innerHTML=esc(html);
      div.appendChild(uav);div.appendChild(bub2);
    }
    wrap.appendChild(div);wrap.scrollTop=wrap.scrollHeight;
  }

  function showTyping(){
    var wrap=document.getElementById("msgs");
    var div=document.createElement("div");div.className="msg co";div.id="typ";
    var av=document.createElement("img");av.className="mav";av.src=CORA_IMG;av.alt="Cora";
    var bub=document.createElement("div");bub.className="bub";
    bub.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
    div.appendChild(av);div.appendChild(bub);wrap.appendChild(div);wrap.scrollTop=wrap.scrollHeight;
  }
  function hideTyping(){var t=document.getElementById("typ");if(t)t.remove();}

  async function send(){
    if(busy)return;
    var inp=document.getElementById("inp");
    var txt=inp.value.trim();if(!txt)return;
    inp.value="";inp.style.height="";
    busy=true;document.getElementById("snd").disabled=true;
    addMsg("user",txt);showTyping();
    try{
      history.push({role:"user",content:txt});
      var data=await callAPI(API_KEY,history,buildSys(),1000);
      if(data.error){
        hideTyping();
        addMsg("cora","Error: "+data.error.message+"<br>Tap <strong>Change Key</strong> if your key expired.");
        history.pop();
        busy=false;document.getElementById("snd").disabled=false;return;
      }
      var reply=(data.content&&data.content[0]&&data.content[0].text)||"Try again ser!";
      history.push({role:"assistant",content:reply});
      hideTyping();addMsg("cora",md(reply));
    }catch(e){
      hideTyping();
      addMsg("cora","Network error: "+e.message);
      history.pop();
    }
    busy=false;document.getElementById("snd").disabled=false;
    document.getElementById("msgs").scrollTop=9999;
  }

  document.getElementById("snd").addEventListener("click",send);
  document.getElementById("inp").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
  document.getElementById("inp").addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px";});
  document.querySelectorAll(".chip").forEach(function(c){c.addEventListener("click",function(){document.getElementById("inp").value=this.dataset.q;send();});});

  function boot(){
    badge("\u25cf connecting...","#8892a4");
    fetchAll().then(function(ok){
      var pb="";
      if(ok&&LD.ok){var c=LD.coins;pb=" Right now: BTC "+c.BTC.price+" ("+(parseFloat(c.BTC.chg)>=0?"+":"")+c.BTC.chg+"%), ETH "+c.ETH.price+".";}
      addMsg("cora","<strong>gm ser!</strong> I am <strong>Cora</strong> &mdash; your crypto AI."+pb+"<br><br>Ask me about prices, DeFi yields, MEV bots, or anything markets. What's on your mind?");
    });
    setInterval(fetchAll,60000);
  }

  hideSetup();
  boot();
})();
</script>
</body>
</html>
